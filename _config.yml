# ── 아래는 그대로 ────────────────────────────
baseurl: ""
url: ""
markdown: kramdown
permalink: /blog/:year/:month/:title/
timezone: Asia/Seoul
plugins: [jekyll-seo-tag, jekyll-feed, jekyll-sitemap]

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope: { path: "", type: posts }
    values: { layout: post }
  - scope: { path: "", type: projects }
    values: { layout: project }

exclude: [Gemfile, Gemfile.lock, README.md, vendor]
